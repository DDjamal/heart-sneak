<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HeartSync Redirect</title>
  <style>
    body {
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
      font-family: Arial, sans-serif;
      background-color: #f0f0f0;
      text-align: center;
      color: #333;
    }
    .container {
      background: #fff;
      padding: 30px;
      border-radius: 12px;
      box-shadow: 0 5px 15px rgba(0,0,0,0.1);
    }
    p {
      margin: 10px 0;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Welcome to HeartSync 💜</h1>
    <p>Trying to open your app…</p>
    <p>If nothing happens, make sure HeartSync is installed.</p>
  </div>

  <script>
    // رابط التطبيق من Custom Scheme
    const appScheme = "heartsync://join";
    // تمرير أي query parameters موجودة
    const urlWithParams = appScheme + window.location.search;

    const now = Date.now();
    // محاولة فتح التطبيق مباشرة
    window.location = urlWithParams;

    // إذا التطبيق غير مثبت، يبقى المستخدم في الصفحة
    setTimeout(() => {
      if (Date.now() - now < 1500) {
        console.log("App not installed or did not respond");
        // هنا يمكنك إضافة رسالة إضافية أو زر لاحقًا
      }
    }, 1500);
  </script>
</body>
</html>
