<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HeartSync Redirect</title>
</head>
<body>
  <p>Redirecting to HeartSync...</p>

  <script>
    // فتح التطبيق مباشرة باستخدام Custom Scheme
    const appScheme = "heartsync://join"; // الرابط من AndroidManifest.xml
    window.location = appScheme + window.location.search;
  </script>
</body>
</html>
