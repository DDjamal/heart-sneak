<!DOCTYPE html>
<html lang="ar">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HeartSync - قلوب متصلة</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700&display=swap');
    
    body {
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
      font-family: 'Cairo', sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      text-align: center;
      color: #fff;
      overflow: hidden;
      position: relative;
    }

    /* خلفية متحركة بالقلوب */
    .hearts-background {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 0;
    }

    .heart {
      position: absolute;
      font-size: 20px;
      color: rgba(255, 255, 255, 0.3);
      animation: float 6s ease-in-out infinite;
    }

    @keyframes float {
      0%, 100% {
        transform: translateY(0) rotate(0deg);
      }
      50% {
        transform: translateY(-20px) rotate(10deg);
      }
    }

    .container {
      background: rgba(255, 255, 255, 0.95);
      padding: 40px;
      border-radius: 30px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
      max-width: 450px;
      width: 90%;
      position: relative;
      z-index: 1;
      backdrop-filter: blur(10px);
      border: 2px solid rgba(255, 255, 255, 0.5);
      animation: fadeInUp 1s ease;
    }

    @keyframes fadeInUp {
      from {
        opacity: 0;
        transform: translateY(30px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    h1 {
      color: #764ba2;
      font-size: 2.5em;
      margin-bottom: 10px;
      font-weight: 700;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
    }

    h1 span {
      animation: heartbeat 1.5s ease-in-out infinite;
    }

    @keyframes heartbeat {
      0%, 100% {
        transform: scale(1);
      }
      25% {
        transform: scale(1.1);
      }
      50% {
        transform: scale(1.2);
      }
      75% {
        transform: scale(1.1);
      }
    }

    .subtitle {
      color: #666;
      font-size: 1.2em;
      margin-bottom: 30px;
      font-weight: 300;
    }

    .loading-animation {
      margin: 30px 0;
    }

    .heartbeat-loader {
      display: flex;
      justify-content: center;
      gap: 15px;
    }

    .heartbeat-loader span {
      width: 20px;
      height: 20px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      border-radius: 50%;
      animation: pulse 1.5s ease-in-out infinite;
    }

    .heartbeat-loader span:nth-child(2) {
      animation-delay: 0.2s;
    }

    .heartbeat-loader span:nth-child(3) {
      animation-delay: 0.4s;
    }

    @keyframes pulse {
      0%, 100% {
        transform: scale(1);
        opacity: 0.5;
      }
      50% {
        transform: scale(1.5);
        opacity: 1;
      }
    }

    .message {
      color: #555;
      font-size: 1.1em;
      margin: 20px 0;
      line-height: 1.6;
    }

    .button {
      display: inline-block;
      margin-top: 20px;
      padding: 15px 40px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: #fff;
      text-decoration: none;
      border-radius: 50px;
      font-size: 1.2em;
      font-weight: 600;
      transition: all 0.3s;
      cursor: pointer;
      border: none;
      box-shadow: 0 10px 20px rgba(102, 126, 234, 0.4);
      position: relative;
      overflow: hidden;
    }

    .button:hover {
      transform: translateY(-3px);
      box-shadow: 0 15px 30px rgba(102, 126, 234, 0.5);
    }

    .button:active {
      transform: translateY(0);
    }

    .button::after {
      content: '';
      position: absolute;
      top: 50%;
      left: 50%;
      width: 0;
      height: 0;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.3);
      transform: translate(-50%, -50%);
      transition: width 0.6s, height 0.6s;
    }

    .button:hover::after {
      width: 300px;
      height: 300px;
    }

    .emoji-heart {
      display: inline-block;
      animation: spin 4s linear infinite;
    }

    @keyframes spin {
      from {
        transform: rotate(0deg);
      }
      to {
        transform: rotate(360deg);
      }
    }

    /* تنسيق خاص للعرض على الجوال */
    @media (max-width: 480px) {
      .container {
        padding: 30px 20px;
      }
      
      h1 {
        font-size: 2em;
      }
      
      .button {
        padding: 12px 30px;
        font-size: 1.1em;
      }
    }
  </style>
</head>
<body>
  <!-- خلفية متحركة بالقلوب -->
  <div class="hearts-background" id="heartsBackground"></div>

  <div class="container">
    <h1>
      <span>💜</span>
      HeartSync
      <span>💜</span>
    </h1>
    <div class="subtitle">قلوب متصلة بالحب</div>
    
    <div class="loading-animation">
      <div class="heartbeat-loader">
        <span></span>
        <span></span>
        <span></span>
      </div>
    </div>

    <div class="message">
      <p>✨ جاري فتح تطبيق الحب ✨</p>
      <p style="font-size: 0.9em; color: #888;">إذا لم يتم الفتح تلقائياً، اضغط على الزر أدناه</p>
    </div>

    <button id="openAppBtn" class="button">
      <span class="emoji-heart">💜</span> افتح التطبيق <span class="emoji-heart">💜</span>
    </button>
  </div>

  <script>
    // إنشاء خلفية القلوب المتحركة
    function createHearts() {
      const heartsContainer = document.getElementById('heartsBackground');
      const heartSymbols = ['💜', '💖', '💝', '💕', '💗', '💓', '💘'];
      
      for (let i = 0; i < 30; i++) {
        const heart = document.createElement('div');
        heart.className = 'heart';
        heart.innerHTML = heartSymbols[Math.floor(Math.random() * heartSymbols.length)];
        heart.style.left = Math.random() * 100 + '%';
        heart.style.top = Math.random() * 100 + '%';
        heart.style.fontSize = (Math.random() * 30 + 20) + 'px';
        heart.style.animationDelay = Math.random() * 5 + 's';
        heart.style.animationDuration = (Math.random() * 4 + 4) + 's';
        heartsContainer.appendChild(heart);
      }
    }

    // منطق فتح التطبيق
    const appScheme = "heartsync://join";
    const urlWithParams = appScheme + window.location.search;
    const now = Date.now();

    // محاولة فتح التطبيق تلقائياً
    window.location.href = urlWithParams;

    // إظهار الزر إذا لم يفتح التطبيق خلال 1.5 ثانية
    setTimeout(() => {
      if (Date.now() - now < 1500) {
        document.getElementById("openAppBtn").style.display = "inline-block";
      }
    }, 1500);

    // فتح التطبيق عند الضغط على الزر
    document.getElementById("openAppBtn").addEventListener("click", () => {
      window.location.href = urlWithParams;
    });

    // بدأ حركة القلوب
    createHearts();

    // إضافة تأثيرات إضافية عند تحميل الصفحة
    document.addEventListener('DOMContentLoaded', function() {
      // إخفاء الزر في البداية
      document.getElementById("openAppBtn").style.display = "none";
    });
  </script>
</body>
</html>
